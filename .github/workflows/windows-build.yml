name: Windows Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Cppcheck (Static Analysis)
        run: choco install cppcheck --version=2.14.0 -y

      - name: Run Code Quality & Static Analysis (Cppcheck)
        shell: powershell
        run: |
          subst R: "$env:GITHUB_WORKSPACE\cppcheck_cfg"
          if (!(Test-Path 'R:\winlibs64ucrt_stage\inst_cppcheck-2.14.0\share\Cppcheck\cfg\std.cfg')) {
            throw 'Cppcheck std.cfg was not found at the expected R: path.'
          }
          cppcheck --enable=warning,performance --std=c++17 --inline-suppr --suppress=missingIncludeSystem packages/ apps/

      - name: Install Qt6
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtserialport'
          dir: '${{ github.workspace }}/qt'

      - name: Configure CMake
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        run: cmake --build build --config Release

      - name: Run windeployqt (Deploy DLL Dependencies)
        run: |
          windeployqt --dir build/apps/ide/Release build/apps/ide/Release/ide-embedded.exe

      - name: Upload Windows Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ide-embedded-windows-x64
          path: build/apps/ide/Release/
