name: Windows Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Cppcheck (Static Analysis)
        shell: powershell
        run: |
          $cppcheckMsi = Join-Path $env:RUNNER_TEMP 'cppcheck-2.14.0-x64-Setup.msi'
          Invoke-WebRequest -Uri 'https://github.com/cppcheck-opensource/cppcheck/releases/download/2.14.0/cppcheck-2.14.0-x64-Setup.msi' -OutFile $cppcheckMsi
          Start-Process msiexec.exe -Wait -ArgumentList @('/i', $cppcheckMsi, '/qn', '/norestart')

          $cppcheckExe = (Get-Command cppcheck -ErrorAction SilentlyContinue).Source
          if (-not $cppcheckExe) {
            foreach ($candidate in @('C:\Program Files\Cppcheck\cppcheck.exe', 'C:\Program Files (x86)\Cppcheck\cppcheck.exe')) {
              if (Test-Path $candidate) {
                $cppcheckExe = $candidate
                break
              }
            }
          }

          if (-not $cppcheckExe) {
            throw 'Cppcheck executable was not found after installing the official MSI.'
          }

          [System.IO.File]::AppendAllText($env:GITHUB_PATH, (Split-Path $cppcheckExe) + [Environment]::NewLine)
          & $cppcheckExe --version

      - name: Run Code Quality & Static Analysis (Cppcheck)
        shell: powershell
        run: |
          cppcheck --enable=warning,performance --std=c++17 --inline-suppr --suppress=missingIncludeSystem packages/ apps/

      - name: Install Qt6
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtserialport'
          dir: '${{ github.workspace }}/qt'

      - name: Configure CMake
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        run: cmake --build build --config Release

      - name: Run windeployqt (Deploy DLL Dependencies)
        run: |
          windeployqt --dir build/apps/ide/Release build/apps/ide/Release/ide-embedded.exe

      - name: Upload Windows Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ide-embedded-windows-x64
          path: build/apps/ide/Release/
