name: Build Executable

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: UCRT64
          install: mingw-w64-ucrt-x86_64-toolchain mingw-w64-ucrt-x86_64-cmake ninja

      - name: Configure CMake
        run: |
          cmake -S . -B build -G "Ninja"
        shell: msys2 {0}

      - name: Build executable
        run: |
          cmake --build build --config Release
        shell: msys2 {0}

      - name: Archive binary
        if: success()
        run: |
          mkdir -p artifact
          cp -R build/apps/ide/*.exe artifact/ || echo "No .exe found"
        shell: msys2 {0}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-executable
          path: artifact/
